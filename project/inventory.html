<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SecondSpin | Inventory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode"> <header class="main-header">
       <div class="logo">
    <a href="index.html" style="text-decoration: none; color: inherit;">SecondSpin</a>
</div>
        <div class="search-bar">
            <input type="text" id="shopSearch" placeholder="Filter by artist or genre..." onkeyup="filterRecords()">
        </div>
      <div class="filter-controls" style="padding: 0 40px; margin-top: 20px;">
    <select id="conditionFilter" onchange="filterRecords()" style="padding: 10px; border-radius: 20px;">
        <option value="all">All Conditions</option>
        <option value="Mint">Mint</option>
        <option value="Near Mint">Near Mint</option>
        <option value="Good">Good</option>
        <option value="Poor">Poor</option>
    </select>
</div>
        <div class="nav-right">
    <a href="cart.html" style="text-decoration:none; color:white;">
        Cart (<span id="cart-count">0</span>)
    </a>
        <a href="index.html" style="color:white">Back Home</a>
    </header>

   <section class="featured-vinyl-section">
    <div class="featured-container">
        <div class="vinyl-info-panel">
            <span class="trending-tag">Now Spinning</span>
            <h1 id="featured-title">Modal Soul</h1>
            <p id="featured-artist">Nujabes</p>
            <div class="glass-card">
                <p><strong>Genre:</strong> Jazzy Hip-Hop, Downtempo</p>
                <p><strong>Condition:</strong> Mint (M)</p>
                <p><strong>Fun Fact:</strong> This 2005 masterpiece is a staple of lo-fi beats history.</p>
                <button class="action-btn">Make an Offer</button>
            </div>
        </div>

        <div class="vinyl-column">
            <div class="vinyl-wrapper">
                <div class="vinyl-disc">
                    <img id="featured-img" src="https://i.discogs.com/vrRLAdjSll2Frd-Le6iDp4Od-tCsjidW1VnwzkV59h4/rs:fit/g:sm/q:90/h:600/w:600/czM6Ly9kaXNjb2dz/LWRhdGFiYXNlLWlt/YWdlcy9SLTMxNzgy/NjY4LTE3MzIxMzI2/NTQtMzU0OS5qcGVn.jpeg" alt="Vinyl Cover">
                </div>
            </div>

            <div class="player-controls">
              <button class="ctrl-btn" onclick="prevRecord()">⏮</button>
              <button id="mainPlayBtn" class="ctrl-btn" onclick="togglePlay()">⏸</button>
              <button class="ctrl-btn" onclick="nextRecord()">⏭</button>
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
            </div>
        </div>
    </div>
</section>


<audio id="globalPlayer"></audio>
    <main class="inventory-container">
        <h2>Marketplace Inventory</h2>
        <div id="recordsGrid" class="products">
            </div>
    </main>
    <audio id="globalPlayer"></audio>

    <script src="script.js"></script>
</body>
</html>
