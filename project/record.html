<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SecondSpin | Record Details</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: white; color: black;">
    <header class="main-header">
        <div class="logo" onclick="window.location.href='index.html'">SecondSpin</div>
        <a href="inventory.html" style="color:white">Back to Marketplace</a>
    </header>

    <main class="container" style="padding: 50px; display: flex; gap: 50px;">
        <div id="detail-img" style="flex: 1;">
            </div>
        
        <div style="flex: 1;">
            <h1 id="det-title">Loading...</h1>
            <h2 id="det-artist"></h2>
            <hr>
            <div id="det-specs">
                <p><strong>Grade:</strong> <span id="det-grade"></span></p>
                <p><strong>Genre:</strong> <span id="det-genre"></span></p>
            </div>
            
            <h2 id="det-price" style="color: #ea0606;"></h2>
            
            <div class="shipping-box" style="background: #f4f4f4; padding: 15px; border-radius: 5px; margin: 20px 0;">
                <h4> Bulk Shipping Rates</h4>
                <p>1-3 Records: $5.00</p>
                <p>4-10 Records: $12.00</p>
                <p>10+ Records: FREE</p>
            </div>

            <button class="action-btn" style="width: 100%; padding: 15px; background: black; color: white;">Make an Offer</button>
        </div>
    </main>

      
    <script src="script.js"></script>
</body>
</html>
